<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 Census Demographics Dashboard</title>
<style>
:root{--bg:#0a0a10;--sf:#141420;--bd:#1e1e3a;--tx:#e0e0f0;--mu:#8888aa;--ac:#4fc3f7;--sc:#ff5252;--cf:#ffab40;--uc:#66bb6a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;line-height:1.6}
header{background:linear-gradient(135deg,#0d1b2a,#1b2838,#0d1b2a);border-bottom:1px solid #1a1a3a;padding:2rem 2rem;text-align:center}
header h1{font-size:1.8rem;color:var(--ac);margin-bottom:.25rem}
header .sub{color:var(--mu);font-size:.8rem}
.controls{max-width:1200px;margin:1rem auto 0;padding:0 2rem;display:flex;gap:.75rem;align-items:center;justify-content:center}
.controls select{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.6rem 1.2rem;border-radius:6px;font-size:.9rem;outline:none;cursor:pointer;min-width:220px}
.controls select:focus{border-color:var(--ac)}
.controls .source{color:var(--mu);font-size:.7rem}
/* Stats grid */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--ac);box-shadow:0 0 20px rgba(79,195,247,.06)}
.card h2{font-size:.85rem;color:var(--ac);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:.5rem}
.card h2 .icon{font-size:1.1rem}
/* Population overview */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;font-size:.82rem}
.stat-label{color:var(--mu)}
.stat-val{font-weight:600;font-family:'SF Mono','Cascadia Code',monospace;color:var(--ac)}
.stat-sub{font-size:.65rem;color:var(--mu);margin-top:.15rem}
.big-num{font-size:2.2rem;font-weight:700;color:var(--ac);font-family:'SF Mono','Cascadia Code',monospace;margin-bottom:.25rem}
.big-label{font-size:.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
/* Race bars */
.race-section{max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.race-header{font-size:.85rem;color:var(--ac);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px}
.race-bar-row{display:flex;align-items:center;margin-bottom:.5rem;gap:.75rem}
.race-label{width:200px;font-size:.78rem;text-align:right;flex-shrink:0;color:var(--tx)}
.race-bar-track{flex:1;height:28px;background:rgba(255,255,255,.03);border-radius:5px;overflow:hidden;position:relative}
.race-bar-fill{height:100%;border-radius:5px;transition:width 1s ease-out;display:flex;align-items:center;padding-left:.75rem;font-size:.7rem;font-weight:600;min-width:0;white-space:nowrap}
.race-pct{width:65px;font-size:.8rem;font-weight:600;font-family:'SF Mono',monospace;flex-shrink:0}
.race-count{width:85px;font-size:.7rem;color:var(--mu);flex-shrink:0;text-align:right}
/* Two column layout for lower sections */
.section-grid{max-width:1200px;margin:1.5rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.section-grid{grid-template-columns:1fr}.race-bar-row{flex-wrap:wrap}.race-label{width:100%;text-align:left;margin-bottom:.15rem}}
.education-bar,.poverty-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;margin:.3rem 0 .6rem;overflow:hidden}
.education-fill{height:100%;background:var(--ac);border-radius:3px;transition:width 1s}
.poverty-fill{height:100%;background:var(--cf);border-radius:3px;transition:width 1s}
footer{text-align:center;color:var(--mu);padding:2rem;font-size:.7rem;border-top:1px solid var(--bd);margin-top:2rem}
footer a{color:var(--ac);text-decoration:none}
</style>
</head>
<body>

<header>
  <h1>📊 US Census Demographics Dashboard</h1>
  <div class="sub">American Community Survey · 2023 5-Year Estimates</div>
  <div class="controls">
    <select id="citySelect" onchange="loadCity()">
      <option>Loading cities…</option>
    </select>
    <span class="source">Source: census.gov API</span>
  </div>
</header>

<!-- Population Overview -->
<div class="grid" id="popCards"></div>

<!-- Race / Ethnicity Breakdown -->
<div class="race-section">
  <div class="race-header">🧑 Race & Ethnicity</div>
  <div id="raceBars"></div>
</div>

<!-- Economics + Education -->
<div class="section-grid">
  <div class="card" id="economicsCard"></div>
  <div class="card" id="educationCard"></div>
</div>

<footer>
  Data: <a href="https://www.census.gov/data/developers/data-sets/acs-5year.html" target="_blank">US Census Bureau · ACS 2023 5-Year Estimates</a> ·
  Generated by Ky · OpenClaw
</footer>

<script>
const DATA_URL = 'census_data.json';
let censusData = {};

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    censusData = await r.json();
    populateDropdown();
    loadCity();
  } catch(e) {
    document.getElementById('popCards').innerHTML = '<div class="card" style="text-align:center;color:var(--sc)">⚠ Unable to load data</div>';
  }
}

let allCities = [];
let selectedCity = 'San Diego city, California';
let activeIdx = -1;

function populateDropdown() {
  // Sort alphabetically, strip city/town suffix for sort
  allCities = Object.keys(censusData.cities).sort((a, b) => {
    const na = a.replace(/ (city|town), California$/, '');
    const nb = b.replace(/ (city|town), California$/, '');
    return na.localeCompare(nb);
  });
  const input = document.getElementById('citySearch');
  input.value = 'San Diego, CA';
  input.placeholder = '🔍 Search ' + allCities.length + ' cities…';
  filterCities();
  loadCity();
}

function cleanName(key) {
  return key.replace(/ (city|town), California$/, ', CA');
}

function filterCities() {
  const query = document.getElementById('citySearch').value.toLowerCase();
  const dd = document.getElementById('cityDropdown');
  const matches = allCities.filter(k => cleanName(k).toLowerCase().includes(query));
  
  if (matches.length === 0) {
    dd.innerHTML = '<div class="no-results">No cities match</div>';
  } else {
    dd.innerHTML = matches.map((k, i) => {
      const cls = (k === selectedCity ? ' active' : '') + (i === activeIdx ? ' active' : '');
      return `<div class="item${cls}" data-key="${k.replace(/"/g, '&quot;')}" onmousedown="selectCity('${k.replace(/'/g, "\\'")}')">📍 ${cleanName(k)}</div>`;
    }).join('');
  }
  dd.classList.add('show');
  activeIdx = -1;
}

function showDropdown() {
  filterCities();
}

function handleKey(e) {
  const dd = document.getElementById('cityDropdown');
  const items = dd.querySelectorAll('.item');
  if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx + 1, items.length - 1); filterCities(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx - 1, 0); filterCities(); e.preventDefault(); }
  else if (e.key === 'Enter') { if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].click(); e.preventDefault(); }
  else if (e.key === 'Escape') { dd.classList.remove('show'); }
}

function selectCity(key) {
  selectedCity = key;
  document.getElementById('citySearch').value = cleanName(key);
  document.getElementById('cityDropdown').classList.remove('show');
  loadCity();
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.city-search')) {
    document.getElementById('cityDropdown').classList.remove('show');
  }
});

function loadCity() {
  const d = censusData.cities[selectedCity];
  if (!d) return;
  renderPopulation(d);
  renderRace(d);
  renderEconomics(d);
  renderEducation(d);
}

function fmt(n) { return n.toLocaleString(); }

function renderPopulation(d) {
  document.getElementById('popCards').innerHTML = `
    <div class="card" style="text-align:center">
      <div class="big-label">Total Population</div>
      <div class="big-num">${fmt(d.population.total)}</div>
      <div class="stat-sub">${d.state} · ACS ${d.year}</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Voting Age (18+)</div>
      <div class="big-num">${fmt(d.population.voting_age)}</div>
      <div class="stat-sub">${d.population.voting_age_pct}% of population</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Median Household Income</div>
      <div class="big-num">$${fmt(d.economics.median_household_income)}</div>
      <div class="stat-sub">${d.year} inflation-adjusted dollars</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Poverty Rate</div>
      <div class="big-num" style="color:var(--cf)">${d.economics.poverty_pct}%</div>
      <div class="stat-sub">${fmt(d.economics.poverty_count)} residents below poverty line</div>
    </div>`;
}

function renderRace(d) {
  let html = '';
  d.race.forEach(r => {
    html += `
    <div class="race-bar-row">
      <div class="race-label">${r.group}</div>
      <div class="race-bar-track">
        <div class="race-bar-fill" style="width:${r.pct}%;background:${r.color};color:${r.pct > 10 ? '#fff' : r.color}">${r.pct >= 5 ? r.pct + '%' : ''}</div>
      </div>
      <div class="race-pct" style="color:${r.color}">${r.pct}%</div>
      <div class="race-count">${fmt(r.count)}</div>
    </div>`;
  });
  document.getElementById('raceBars').innerHTML = html;
}

function renderEconomics(d) {
  document.getElementById('economicsCard').innerHTML = `
    <h2><span class="icon">💰</span> Economics</h2>
    <div class="stat-row"><span class="stat-label">Median Household Income</span><span class="stat-val">$${fmt(d.economics.median_household_income)}</span></div>
    <div class="stat-row" style="margin-top:.75rem"><span class="stat-label">Below Poverty Line</span><span class="stat-val" style="color:var(--cf)">${d.economics.poverty_pct}%</span></div>
    <div class="poverty-bar"><div class="poverty-fill" style="width:${d.economics.poverty_pct * 5}%"></div></div>
    <div class="stat-row"><span class="stat-label">Residents in poverty</span><span class="stat-val">${fmt(d.economics.poverty_count)}</span></div>`;

  // If we have more economic data in the future, it goes here
}

function renderEducation(d) {
  const total = d.education.bachelors_or_higher;
  const pct25plus = (total / (d.population.total * 0.75) * 100).toFixed(1); // rough 25+ estimate
  document.getElementById('educationCard').innerHTML = `
    <h2><span class="icon">🎓</span> Education</h2>
    <div class="stat-row"><span class="stat-label">Bachelor's or Higher</span><span class="stat-val">${fmt(total)}</span></div>
    <div class="education-bar"><div class="education-fill" style="width:${Math.min(100, pct25plus)}%"></div></div>
    <div class="stat-row"><span class="stat-label">Bachelor's Degree</span><span class="stat-val">${fmt(d.education.bachelors_only)}</span></div>
    <div class="stat-row"><span class="stat-label">Master's Degree</span><span class="stat-val">${fmt(d.education.masters)}</span></div>
    <div class="stat-row"><span class="stat-label">Professional Degree</span><span class="stat-val">${fmt(d.education.professional)}</span></div>
    <div class="stat-row"><span class="stat-label">Doctorate</span><span class="stat-val">${fmt(d.education.doctorate)}</span></div>`;
}

loadData();
</script>
</body>
</html>
