<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 San Diego — Census & Voting Dashboard</title>
<style>
:root{--bg:#0a0a10;--sf:#141420;--bd:#1e1e3a;--tx:#e0e0f0;--mu:#8888aa;--ac:#4fc3f7;--sc:#ff5252;--cf:#ffab40;--uc:#66bb6a;--pl:#ce93d8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;line-height:1.6}
header{background:linear-gradient(135deg,#0d1b2a,#1b2838,#0d1b2a);border-bottom:1px solid #1a1a3a;padding:2rem 2rem;text-align:center}
header h1{font-size:1.8rem;color:var(--ac);margin-bottom:.25rem}
header .sub{color:var(--mu);font-size:.8rem}
.tabs{display:flex;justify-content:center;gap:.25rem;max-width:1200px;margin:1rem auto 0;padding:0 2rem}
.tab{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:.5rem 1.5rem;border-radius:6px 6px 0 0;font-size:.8rem;cursor:pointer;transition:all .15s;border-bottom:none}
.tab:hover{color:var(--tx)} .tab.active{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--ac);box-shadow:0 0 20px rgba(79,195,247,.06)}
.card h2{font-size:.85rem;color:var(--ac);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}
.big-num{font-size:2.2rem;font-weight:700;color:var(--ac);font-family:'SF Mono','Cascadia Code',monospace;margin-bottom:.25rem}
.big-label{font-size:.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;font-size:.82rem}
.stat-label{color:var(--mu)} .stat-val{font-weight:600;font-family:'SF Mono',monospace}
.bar-bg{height:5px;background:rgba(255,255,255,.05);border-radius:3px;margin:.3rem 0 .6rem;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s}
/* Race bars */
.race-section{max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.race-bar-row{display:flex;align-items:center;margin-bottom:.45rem;gap:.75rem}
.race-label{width:200px;font-size:.78rem;text-align:right;flex-shrink:0;color:var(--tx)}
.race-bar-track{flex:1;height:26px;background:rgba(255,255,255,.03);border-radius:5px;overflow:hidden}
.race-bar-fill{height:100%;border-radius:5px;transition:width 1s ease-out;display:flex;align-items:center;padding-left:.75rem;font-size:.68rem;font-weight:600;white-space:nowrap}
.race-pct{width:60px;font-size:.8rem;font-weight:600;font-family:'SF Mono',monospace;flex-shrink:0}
.race-count{width:80px;font-size:.7rem;color:var(--mu);flex-shrink:0;text-align:right}
/* Voting table */
.vote-table{max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.vote-table table{width:100%;border-collapse:collapse;font-size:.78rem}
.vote-table th{color:var(--mu);text-transform:uppercase;font-size:.65rem;letter-spacing:.5px;padding:.6rem .8rem;text-align:center;border-bottom:1px solid var(--bd)}
.vote-table td{padding:.45rem .6rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-size:.75rem}
.vote-table .race-col{text-align:left;color:var(--tx);font-weight:500}
.vote-table .dem{color:#4fc3f7} .vote-table .gop{color:#ff5252} .vote-table .other{color:var(--mu)}
.vote-table .highlight-row{background:rgba(79,195,247,.04)}
.year-selector{display:flex;justify-content:center;gap:.5rem;margin-bottom:1rem}
.year-btn{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:.35rem 1.2rem;border-radius:5px;font-size:.78rem;cursor:pointer;transition:all .15s}
.year-btn:hover{color:var(--tx)} .year-btn.active{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
/* City search dropdown */
.city-search{position:relative}
.city-search input{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.5rem 1rem;border-radius:6px;font-size:.82rem;outline:none}
.city-search input:focus{border-color:var(--ac)}
.city-search input::placeholder{color:var(--mu)}
.city-dropdown{display:none;position:absolute;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;background:#12121e;border:1px solid var(--bd);border-top:none;border-radius:0 0 8px 8px;z-index:100}
.city-dropdown.show{display:block}
.city-dropdown .item{padding:.45rem .9rem;font-size:.78rem;cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-dropdown .item:hover,.city-dropdown .item.active{background:rgba(79,195,247,.12);color:var(--ac)}
.city-dropdown .no-results,.city-dropdown .loading{padding:.5rem .9rem;font-size:.75rem;color:var(--mu);text-align:center}
footer{text-align:center;color:var(--mu);padding:2rem;font-size:.7rem;border-top:1px solid var(--bd);margin-top:2rem}
@media(max-width:768px){.race-bar-row{flex-wrap:wrap}.race-label{width:100%;text-align:left;margin-bottom:.1rem}}
</style>
</head>
<body>

<header>
  <h1>📊 San Diego — Census & Voting Dashboard</h1>
  <div class="sub">US Census ACS 2023 · National Exit Polls 2016–2024</div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('census')">🏙️ Census Demographics</div>
    <div class="tab" onclick="showTab('voting')">🗳️ Voting by Race (National)</div>
  </div>
  <div class="city-search" style="max-width:500px;margin:1rem auto 0;position:relative">
    <input type="text" id="citySearch" placeholder="🔍 Search 467 CA cities…" autocomplete="off"
           onfocus="showCityDropdown()" oninput="filterCityDropdown()" onkeydown="handleCityKey(event)">
    <div class="city-dropdown" id="cityDropdown"></div>
  </div>
</header>

<!-- CENSUS TAB -->
<div id="tabCensus">
  <div class="grid" id="popCards"></div>
  <div class="race-section" id="raceSection"></div>
  <div class="grid" style="grid-template-columns:1fr 1fr" id="detailGrid"></div>
  <div id="sdVotingSection"></div>
</div>

<!-- VOTING TAB -->
<div id="tabVoting" style="display:none">
  <div class="vote-table" id="votingTable"></div>
</div>

<footer>Data: US Census Bureau · ACS 2023 | CNN/NEP National Exit Polls | Pew Research Center</footer>

<script>
// ══════════════ SAN DIEGO CENSUS DATA (embedded) ══════════════
const DATA_URL = 'census_data.json';
const COUNTY_URL = 'county_voting.json';
let allCities = null;
let allCityKeys = [];
let countyData = null;
let cityCountyMap = {};
let activeIdx = -1;
let currentCity = 'San Diego city, California';
let currentData = null;

// ══════════════ SAN DIEGO CENSUS DATA (default) ══════════════
const SD = {
  state:"CA", year:"2023",
  population: {total:1385061, voting_age:1125769, voting_age_pct:81.3},
  economics: {median_household_income:104321, poverty_count:29040, poverty_pct:2.1},
  education: {bachelors_or_higher:487109, bachelors_only:281352, masters:132824, professional:35379, doctorate:37554},
  race: [
    {group:"White (non-Hispanic)", count:573281, pct:41.4, color:"#4fc3f7"},
    {group:"Hispanic/Latino", count:409493, pct:29.6, color:"#ffab40"},
    {group:"Asian (non-Hispanic)", count:238921, pct:17.2, color:"#66bb6a"},
    {group:"Black/African American", count:74890, pct:5.4, color:"#ff5252"},
    {group:"Two or More Races", count:72136, pct:5.2, color:"#ce93d8"},
    {group:"Other Race", count:8113, pct:0.6, color:"#8888aa"},
    {group:"Native Hawaiian/PI", count:5862, pct:0.4, color:"#80cbc4"},
    {group:"American Indian/AK", count:2365, pct:0.2, color:"#a1887f"}
  ]
};

// ══════════════ NATIONAL VOTING DATA ══════════════
const VOTE = {
  2016: {
    popular: "Clinton 48.2% · Trump 46.1% · Other 5.7%",
    total_votes: "136.7 million",
    turnout: "60.1% of voting-eligible population",
    race_vote: [
      {race:"White", share:71, dem:37, gop:58, other:5, turnout:65.3},
      {race:"Black", share:12, dem:88, gop:8, other:4, turnout:59.6},
      {race:"Hispanic/Latino", share:11, dem:65, gop:29, other:6, turnout:47.6},
      {race:"Asian", share:4, dem:65, gop:29, other:6, turnout:49.3},
      {race:"Other", share:3, dem:56, gop:37, other:7, turnout:48.0}
    ]
  },
  2020: {
    popular: "Biden 51.3% · Trump 46.9% · Other 1.8%",
    total_votes: "158.4 million",
    turnout: "66.0% of voting-eligible population (highest since 1900)",
    race_vote: [
      {race:"White", share:67, dem:41, gop:58, other:1, turnout:70.9},
      {race:"Black", share:13, dem:87, gop:12, other:1, turnout:62.6},
      {race:"Hispanic/Latino", share:13, dem:65, gop:32, other:3, turnout:53.7},
      {race:"Asian", share:4, dem:63, gop:31, other:6, turnout:59.5},
      {race:"Other", share:4, dem:55, gop:41, other:4, turnout:55.0}
    ]
  },
  2024: {
    popular: "Trump 49.8% · Harris 48.3% · Other 1.9%",
    total_votes: "155.2 million",
    turnout: "63.7% of voting-eligible population",
    race_vote: [
      {race:"White", share:71, dem:39, gop:57, other:4, turnout:67.0},
      {race:"Black", share:11, dem:85, gop:13, other:2, turnout:58.0},
      {race:"Hispanic/Latino", share:12, dem:52, gop:46, other:2, turnout:50.0},
      {race:"Asian", share:3, dem:54, gop:39, other:7, turnout:56.0},
      {race:"Other", share:3, dem:50, gop:43, other:7, turnout:50.0}
    ]
  }
};

// ══════════════ SAN DIEGO COUNTY VOTING ══════════════
const SD_VOTE = {
  registered: {total:1920000, dem:39, gop:26, npp:28, other:7},
  presidential: {
    2024: {dem:"Harris", dem_pct:56.4, gop:"Trump", gop_pct:41.9, other_pct:1.7, turnout:78.5, total_votes:1504000},
    2020: {dem:"Biden", dem_pct:60.2, gop:"Trump", gop_pct:37.5, other_pct:2.3, turnout:83.5, total_votes:1660000},
    2016: {dem:"Clinton", dem_pct:56.3, gop:"Trump", gop_pct:36.1, other_pct:7.6, turnout:79.0, total_votes:1367000}
  }
};

// ══════════════ RENDER ══════════════
function fmt(n) { return n.toLocaleString(); }

function renderCensus() {
  const d = currentData || SD;
  // Population cards
  document.getElementById('popCards').innerHTML = `
    <div class="card" style="text-align:center">
      <div class="big-label">Total Population</div>
      <div class="big-num">${fmt(d.population.total)}</div>
      <div class="stat-sub">${cleanCityName(currentCity)} · ACS ${d.year}</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Voting Age (18+)</div>
      <div class="big-num">${fmt(d.population.voting_age)}</div>
      <div class="stat-sub">${d.population.voting_age_pct}% of population</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Median Household Income</div>
      <div class="big-num">$${fmt(d.economics.median_household_income)}</div>
      <div class="stat-sub">${d.year} inflation-adjusted dollars</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Poverty Rate</div>
      <div class="big-num" style="color:var(--cf)">${d.economics.poverty_pct}%</div>
      <div class="stat-sub">${fmt(d.economics.poverty_count)} residents below poverty line</div>
    </div>`;

  // Race bars
  let raceHtml = '<div class="card"><h2>🧑 Race & Ethnicity — ' + cleanCityName(currentCity) + '</h2>';
  d.race.forEach(r => {
    raceHtml += `
    <div class="race-bar-row">
      <div class="race-label">${r.group}</div>
      <div class="race-bar-track">
        <div class="race-bar-fill" style="width:${r.pct}%;background:${r.color};color:${r.pct>10?'#fff':r.color}">${r.pct>=5?r.pct+'%':''}</div>
      </div>
      <div class="race-pct" style="color:${r.color}">${r.pct}%</div>
      <div class="race-count">${fmt(r.count)}</div>
    </div>`;
  });
  raceHtml += '</div>';
  document.getElementById('raceSection').innerHTML = raceHtml;

  // Economics + Education
  const eduTotal = d.education.bachelors_or_higher;
  const eduPct = (eduTotal / (d.population.total * 0.75) * 100).toFixed(1);
  document.getElementById('detailGrid').innerHTML = `
    <div class="card">
      <h2>💰 Economics</h2>
      <div class="stat-row"><span class="stat-label">Median Household Income</span><span class="stat-val" style="color:var(--ac)">$${fmt(d.economics.median_household_income)}</span></div>
      <div class="stat-row" style="margin-top:.75rem"><span class="stat-label">Below Poverty Line</span><span class="stat-val" style="color:var(--cf)">${d.economics.poverty_pct}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${d.economics.poverty_pct*5}%;background:var(--cf)"></div></div>
      <div class="stat-row"><span class="stat-label">Residents in poverty</span><span class="stat-val">${fmt(d.economics.poverty_count)}</span></div>
    </div>
    <div class="card">
      <h2>🎓 Education (Age 25+)</h2>
      <div class="stat-row"><span class="stat-label">Bachelor's or Higher</span><span class="stat-val" style="color:var(--ac)">${fmt(eduTotal)}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,eduPct)}%;background:var(--ac)"></div></div>
      <div class="stat-row"><span class="stat-label">Bachelor's Degree</span><span class="stat-val">${fmt(d.education.bachelors_only)}</span></div>
      <div class="stat-row"><span class="stat-label">Master's Degree</span><span class="stat-val">${fmt(d.education.masters)}</span></div>
      <div class="stat-row"><span class="stat-label">Professional Degree</span><span class="stat-val">${fmt(d.education.professional)}</span></div>
      <div class="stat-row"><span class="stat-label">Doctorate</span><span class="stat-val">${fmt(d.education.doctorate)}</span></div>
    </div>`;
  
  renderAllSDVoting('2024');
}

function renderVoting(year) {
  const d = VOTE[year];
  if (!d) return;
  
  let html = `<div class="year-selector">`;
  Object.keys(VOTE).forEach(y => {
    html += `<div class="year-btn${y==year?' active':''}" onclick="renderVoting('${y}')">${y} Election</div>`;
  });
  html += `</div>`;

  // Election overview cards
  html += `<div class="grid" style="margin-top:0">
    <div class="card" style="text-align:center">
      <div class="big-label">Popular Vote</div>
      <div class="big-num" style="font-size:1.1rem">${d.popular}</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Total Votes Cast</div>
      <div class="big-num">${d.total_votes}</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="big-label">Voter Turnout</div>
      <div class="big-num">${d.turnout}</div>
    </div>
  </div>`;

  // Race x Party Table
  html += `<div class="card"><h2>🗳️ Vote by Race & Ethnicity — ${year}</h2>`;
  html += `<table>
    <thead><tr>
      <th style="text-align:left">Race/Ethnicity</th>
      <th>Share of<br>Electorate</th>
      <th>Democratic</th>
      <th>Republican</th>
      <th>Margin</th>
      <th>Other</th>
      <th>Turnout<br>Rate</th>
    </tr></thead><tbody>`;

  d.race_vote.forEach((r, i) => {
    const cls = i % 2 === 0 ? ' highlight-row' : '';
    const margin = r.dem - r.gop;
    const marginColor = margin > 0 ? 'var(--ac)' : 'var(--sc)';
    const marginSign = margin > 0 ? 'D+' : 'R+';
    html += `<tr class="${cls}">
      <td class="race-col"><strong>${r.race}</strong></td>
      <td>${r.share}%</td>
      <td class="dem"><strong>${r.dem}%</strong></td>
      <td class="gop"><strong>${r.gop}%</strong></td>
      <td style="color:${marginColor};font-weight:600">${marginSign}${Math.abs(margin)}</td>
      <td class="other">${r.other}%</td>
      <td>${r.turnout}%</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  html += `<div style="margin-top:1rem;padding:.75rem;background:rgba(255,171,64,.06);border-radius:8px;font-size:.72rem;color:var(--mu)">
    📋 <strong>Sources:</strong> CNN / National Election Pool exit polls (Edison Research). Turnout rates from US Census Bureau CPS Voting Supplement. 
    Margins of error: ±2-3 pts for large groups, ±4-6 pts for smaller groups.
  </div></div>`;

  // Trend callouts
  html += `<div class="grid" style="grid-template-columns:1fr 1fr">`;
  html += `<div class="card"><h2>📈 Key Trends</h2>`;
  html += `<div style="font-size:.78rem;line-height:1.7;color:var(--tx)">`;
  html += `<p><span style="color:var(--cf);font-weight:600">Hispanic/Latino Realignment:</span> Democratic margin collapsed from <span class="dem">D+36</span> in 2016 to just <span class="dem">D+6</span> in 2024 — the single biggest demographic shift across all three elections.</p>`;
  html += `<p style="margin-top:.5rem"><span style="color:var(--ac);font-weight:600">Black Voters:</span> Most consistently Democratic group. 85%+ Democratic in all three elections, though Republican share doubled from 8% (2016) to 13% (2024).</p>`;
  html += `<p style="margin-top:.5rem"><span style="color:var(--ac);font-weight:600">White Voters:</span> Reliably Republican but steady — GOP margin hovered around R+20 across all three cycles.</p>`;
  html += `</div></div>`;

  html += `<div class="card"><h2>📊 Turnout by Race</h2>`;
  d.race_vote.forEach(r => {
    html += `<div class="stat-row"><span class="stat-label">${r.race}</span><span class="stat-val">${r.turnout}%</span></div>`;
    html += `<div class="bar-bg"><div class="bar-fill" style="width:${r.turnout}%;background:var(--ac)"></div></div>`;
  });
  html += `<div style="margin-top:.5rem;font-size:.65rem;color:var(--mu)">Census CPS: self-reported turnout among citizen voting-age population</div>`;
  html += `</div></div>`;

  document.getElementById('votingTable').innerHTML = html;
}

function getCountyForCity() {
  if (countyData && countyData.city_county_map && countyData.city_county_map[currentCity]) {
    const fips = countyData.city_county_map[currentCity];
    if (countyData.counties && countyData.counties[fips]) {
      return { fips: fips, data: countyData.counties[fips] };
    }
  }
  return null;
}

function renderSDVoting(year) {
  const county = getCountyForCity();
  const countyName = county ? county.data.name : 'San Diego County';
  
  let presData, regData;
  if (county && county.data.presidential && county.data.presidential[year]) {
    presData = county.data.presidential[year];
    regData = county.data.registration || SD_VOTE.registered;
  } else {
    // Fallback to embedded San Diego
    presData = SD_VOTE.presidential[year];
    regData = SD_VOTE.registered;
  }
  if (!presData) return '';
  
  let h = `<div class="card" style="margin:1.5rem auto;max-width:1200px"><h2>🗳️ ${countyName} Presidential Results</h2>`;
  h += `<div style="display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem">`;
  const years = county && county.data.presidential ? Object.keys(county.data.presidential) : Object.keys(SD_VOTE.presidential);
  years.forEach(yr => {
    h += `<div class="year-btn${yr==year?' active':''}" onclick="renderAllSDVoting('${yr}')">${yr}</div>`;
  });
  h += `</div>`;

  const margin = presData.dem_pct - presData.gop_pct;
  const marginColor = margin > 0 ? 'var(--ac)' : 'var(--sc)';
  const marginLabel = margin > 0 ? 'D+' : 'R+';

  h += `<div style="margin-bottom:.75rem">
    <div class="stat-row"><span class="stat-label">Democratic</span><span class="stat-val" style="color:var(--ac)">${presData.dem_pct}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${presData.dem_pct}%;background:var(--ac)"></div></div>
    <div class="stat-row" style="margin-top:.5rem"><span class="stat-label">Republican</span><span class="stat-val" style="color:var(--sc)">${presData.gop_pct}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${presData.gop_pct}%;background:var(--sc)"></div></div>
  </div>`;

  h += `<div class="grid" style="grid-template-columns:repeat(3,1fr);margin:1rem 0;padding:0">
    <div style="text-align:center;padding:.5rem">
      <div class="big-label">Margin</div>
      <div class="big-num" style="font-size:1.3rem;color:${marginColor}">${marginLabel}${Math.abs(margin).toFixed(1)}</div>
    </div>
    <div style="text-align:center;padding:.5rem">
      <div class="big-label">Total Votes</div>
      <div class="big-num" style="font-size:1.3rem">${presData.total_votes ? (presData.total_votes/1e6).toFixed(2)+'M' : '—'}</div>
    </div>
    <div style="text-align:center;padding:.5rem">
      <div class="big-label">Voter Turnout</div>
      <div class="big-num" style="font-size:1.3rem;color:var(--uc)">${presData.turnout ? presData.turnout+'%' : '—'}</div>
    </div>
  </div>

  <div style="font-size:.72rem;color:var(--mu);margin-top:.5rem">
    📋 <strong>Source:</strong> California Secretary of State, Statement of Vote.
  </div></div>`;

  // Voter Registration
  h += `<div class="card" style="margin:1rem auto;max-width:1200px"><h2>📋 ${countyName} Voter Registration (2024)</h2>`;
  const regTotal = regData.total || (regData.total_registered || 0);
  h += `<div class="stat-row"><span class="stat-label">Total Registered Voters</span><span class="stat-val" style="color:var(--ac)">${fmt(regTotal)}</span></div>`;
  
  const regParties = [
    {label:"Democratic", pct:regData.dem_pct||regData.dem||0, color:"var(--ac)"},
    {label:"No Party Preference", pct:regData.npp_pct||regData.npp||0, color:"var(--mu)"},
    {label:"Republican", pct:regData.gop_pct||regData.gop||0, color:"var(--sc)"},
    {label:"Other", pct:regData.other_pct||regData.other||0, color:"#8888aa"}
  ];
  regParties.forEach(p => {
    h += `<div class="stat-row" style="margin-top:.4rem"><span class="stat-label">${p.label}</span><span class="stat-val" style="color:${p.color}">${p.pct}%</span></div>`;
    h += `<div class="bar-bg"><div class="bar-fill" style="width:${p.pct}%;background:${p.color}"></div></div>`;
  });
  h += `<div style="font-size:.72rem;color:var(--mu);margin-top:.75rem">📋 <strong>Source:</strong> California Secretary of State, Report of Registration.</div>`;
  h += `</div>`;

  return h;
}

let currentVoteYear = '2024';
function renderAllSDVoting(year) {
  currentVoteYear = year || '2024';
  document.getElementById('sdVotingSection').innerHTML = renderSDVoting(currentVoteYear);
}

// ── CITY SEARCH & LOADING ──
function cleanCityName(key) {
  return key.replace(/ (city|town), California$/, ', CA');
}

function filterCityDropdown() {
  const q = document.getElementById('citySearch').value.toLowerCase();
  const dd = document.getElementById('cityDropdown');
  if (!allCityKeys.length) {
    dd.innerHTML = '<div class="loading">Loading 467 cities…</div>';
    dd.classList.add('show');
    return;
  }
  const matches = allCityKeys.filter(k => cleanCityName(k).toLowerCase().includes(q));
  if (!matches.length) {
    dd.innerHTML = '<div class="no-results">No cities match</div>';
  } else {
    dd.innerHTML = matches.map((k, i) =>
      `<div class="item${i===activeIdx?' active':''}" data-key="${k.replace(/"/g,'&quot;')}">📍 ${cleanCityName(k)}</div>`
    ).join('');
  }
  dd.classList.add('show');
}

function showCityDropdown() { filterCityDropdown(); }

function handleCityKey(e) {
  const items = document.querySelectorAll('#cityDropdown .item');
  if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx+1, items.length-1); filterCityDropdown(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx-1, 0); filterCityDropdown(); e.preventDefault(); }
  else if (e.key === 'Enter') { if (activeIdx>=0 && items[activeIdx]) selectCity(items[activeIdx].dataset.key); e.preventDefault(); }
  else if (e.key === 'Escape') { document.getElementById('cityDropdown').classList.remove('show'); }
}

function selectCity(key) {
  if (!key) return;
  currentCity = key;
  currentData = (allCities && allCities[key]) ? allCities[key] : SD;
  document.getElementById('citySearch').value = cleanCityName(key);
  document.getElementById('cityDropdown').classList.remove('show');
  renderCensus();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.city-search')) document.getElementById('cityDropdown').classList.remove('show');
});

// Add dropdown click delegation
document.getElementById('cityDropdown').addEventListener('mousedown', function(e) {
  const el = e.target.closest('.item');
  if (el && el.dataset.key) selectCity(el.dataset.key);
});

async function loadAllCities() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!data.cities) throw new Error('Missing cities');
    allCities = data.cities;
    allCityKeys = Object.keys(allCities).sort((a,b) => cleanCityName(a).localeCompare(cleanCityName(b)));
    currentData = allCities['San Diego city, California'] || SD;
    document.getElementById('citySearch').placeholder = '🔍 Search ' + allCityKeys.length + ' CA cities…';
  } catch(e) {
    console.log('City data deferred, using embedded data:', e.message);
    allCityKeys = [];
  }
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabCensus').style.display = tab === 'census' ? '' : 'none';
  document.getElementById('tabVoting').style.display = tab === 'voting' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => {
    if ((tab==='census' && t.textContent.includes('Census')) || 
        (tab==='voting' && t.textContent.includes('Voting'))) t.classList.add('active');
  });
  if (tab === 'voting' && !document.getElementById('votingTable').innerHTML) renderVoting('2024');
}

async function loadCountyData() {
  try {
    const r = await fetch(COUNTY_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    countyData = await r.json();
    // Refresh voting section if visible
    if (document.getElementById('sdVotingSection').innerHTML.trim()) {
      renderAllSDVoting(currentVoteYear);
    }
  } catch(e) {
    console.log('County data deferred:', e.message);
  }
}

// Boot
currentData = SD;
renderCensus();
loadAllCities();
loadCountyData();
</script>
