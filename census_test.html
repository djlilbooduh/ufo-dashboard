<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Test</title></head>
<body style="background:#0a0a10;color:#e0e0f0;font-family:sans-serif;padding:2rem">
<h1>Census Test</h1>
<div id="result">Loading…</div>
<script>
fetch('census_data.json')
  .then(r => r.json())
  .then(d => {
    var n = Object.keys(d.cities).length;
    document.getElementById('result').innerHTML = '✅ Loaded ' + n + ' cities<br>First: ' + Object.keys(d.cities)[0];
  })
  .catch(e => {
    document.getElementById('result').innerHTML = '❌ Error: ' + e.message;
  });
</script>
</body></html>
